<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Red rounded square -->
  <rect width="100" height="100" rx="14" fill="#CC0000"/>

  <!--
    White R drawn as a compound path (evenodd).
    The triangular red gap between the stem's right edge (x=25)
    and the inner leg edge (30,49 → 63,83) is the tail fin:
    5px wide at the tip (y=49), 38px wide at the base (y=83).
  -->
  <path
    fill="white"
    fill-rule="evenodd"
    d="
      M 13,83
      L 13,9
      L 52,9
      Q 80,9 80,29
      Q 80,49 52,49
      L 44,49
      L 78,83
      L 63,83
      L 30,49
      L 25,49
      L 25,83
      Z
      M 25,21
      L 25,49
      L 49,49
      Q 67,49 67,35
      Q 67,21 49,21
      Z
    "
  />

  <!-- Runway threshold line -->
  <rect x="11" y="87" width="78" height="2" rx="1" fill="white"/>
</svg>
